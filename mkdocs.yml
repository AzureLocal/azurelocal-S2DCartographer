site_name: S2DCartographer
site_description: S2DCartographer — Storage Spaces Direct analysis, visualization, and capacity reporting for Azure Local and Windows Server
site_author: Azure Local Cloud
site_url: https://azurelocal.github.io/azurelocal-s2d-cartographer/
repo_url: https://github.com/AzureLocal/azurelocal-s2d-cartographer
repo_name: AzureLocal/azurelocal-s2d-cartographer

theme:
  name: material
  logo: assets/images/s2dcartographer-icon.svg
  favicon: assets/images/s2dcartographer-icon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - md_in_html

plugins:
  - search

extra:
  analytics:
    provider: google
    property: G-2D9XDHSXJW
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/countrycloudboy
      name: CountryCloudBoy on X
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal/azurelocal-s2d-cartographer
      name: GitHub Repository
    - icon: fontawesome/solid/globe
      link: https://azurelocal.cloud
      name: Azure Local Community
  homepage: https://azurelocal.cloud

copyright: >-
  Copyright &copy; 2026 Azure Local. Designed and maintained by
  <a href="https://www.hybridsolutions.cloud">Hybrid Cloud Solutions</a>.

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Connecting: connecting.md
  - Collectors:
    - Overview: collectors.md
    - Physical Disks: collectors/physical-disks.md
    - Storage Pool: collectors/storage-pool.md
    - Volume Map: collectors/volume-map.md
    - Cache Tier: collectors/cache-tier.md
    - Capacity Waterfall: collectors/capacity-waterfall.md
    - Health Checks: collectors/health-checks.md
  - Outputs:
    - Reports: reports.md
    - Diagrams: diagrams.md
    - Cluster Snapshot Schema: schema/cluster-snapshot.md
    - What-If Modeling: what-if.md
    - Sample Reports: samples.md
  - Concepts:
    - TiB vs TB: tib-vs-tb.md
    - Capacity Math: capacity-math.md
    - Architecture: concepts/architecture.md
  - Cmdlet Reference:
    - Overview: cmdlets/index.md
    - Invoke-S2DCartographer: cmdlets/Invoke-S2DCartographer.md
    - Invoke-S2DCapacityWhatIf: cmdlets/Invoke-S2DCapacityWhatIf.md
    - Connect-S2DCluster: cmdlets/Connect-S2DCluster.md
    - Disconnect-S2DCluster: cmdlets/Disconnect-S2DCluster.md
    - Get-S2DPhysicalDiskInventory: cmdlets/Get-S2DPhysicalDiskInventory.md
    - Get-S2DStoragePoolInfo: cmdlets/Get-S2DStoragePoolInfo.md
    - Get-S2DVolumeMap: cmdlets/Get-S2DVolumeMap.md
    - Get-S2DCacheTierInfo: cmdlets/Get-S2DCacheTierInfo.md
    - Get-S2DCapacityWaterfall: cmdlets/Get-S2DCapacityWaterfall.md
    - Get-S2DHealthStatus: cmdlets/Get-S2DHealthStatus.md
    - New-S2DReport: cmdlets/New-S2DReport.md
    - New-S2DDiagram: cmdlets/New-S2DDiagram.md
    - ConvertTo-S2DCapacity: cmdlets/ConvertTo-S2DCapacity.md
  - Companion Tools: companion-tools.md
  - Project:
    - Roadmap: project/roadmap.md
    - Troubleshooting: project/troubleshooting.md
    - Changelog: changelog.md

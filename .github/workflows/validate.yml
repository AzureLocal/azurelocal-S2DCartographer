name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  validate-docs-and-module:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Validate MkDocs build
        run: mkdocs build --strict

      - name: Validate module manifest
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./S2DCartographer.psd1 | Out-Null

      - name: Import root module
        shell: pwsh
        run: |
          Import-Module ./S2DCartographer.psd1 -Force
          Get-Module S2DCartographer | Format-List Name,Version,Path

  platform-maproom:
    name: Platform MAPROOM validation
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: AzureLocal/platform
          path: _platform
          ref: main

      - name: Import AzureLocal.Maproom and validate fixtures
        shell: pwsh
        run: |
          Import-Module .\_platform\testing\maproom\AzureLocal.Maproom.psd1 -Force
          Get-Module AzureLocal.Maproom | Format-List Name, Version

          $fixtures = Get-ChildItem -Path .\tests\maproom\Fixtures\*.json |
              Where-Object { $_.Name -ne 'synthetic-cluster.json' }
          foreach ($f in $fixtures) {
            Write-Host "Validating $($f.Name)..."
            Test-MaproomFixture -Path $f.FullName | Out-Null
            Write-Host "  OK $($f.Name)"
          }
          Write-Host "All $($fixtures.Count) fixtures passed platform schema validation."

  pester-unit:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.6.0 -Force -Scope CurrentUser

      - name: Run unit tests
        shell: pwsh
        run: |
          Import-Module .\S2DCartographer.psd1 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = '.\tests\maproom\unit'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults\pester-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed."
            exit 1
          }

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: TestResults\pester-results.xml

name: Publish to PSGallery

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual Publish-Module call)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install required module dependencies
        shell: pwsh
        run: |
          Install-Module ImportExcel -Force -Scope CurrentUser -MinimumVersion 7.0.0

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./S2DCartographer.psd1 -ErrorAction Stop
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)"

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          Import-Module ./S2DCartographer.psd1 -Force
          $result = Invoke-Pester -Path ./tests/maproom/unit -PassThru -Output Minimal
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester test(s) failed. Aborting publish."
          }

      - name: Publish to PSGallery
        if: ${{ github.event_name == 'release' || github.event.inputs.dry_run == 'false' }}
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGALLERY_API_KEY secret is not set. Cannot publish.'
          }
          # Stage only module files — exclude tests, docs, samples, .github
          $stagingDir = Join-Path $env:RUNNER_TEMP 'staging' 'S2DCartographer'
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          foreach ($item in @('S2DCartographer.psd1','S2DCartographer.psm1','Modules','LICENSE','README.md')) {
            $src = Join-Path $env:GITHUB_WORKSPACE $item
            if (Test-Path $src) { Copy-Item -Path $src -Destination $stagingDir -Recurse -Force }
          }
          Publish-Module -Path $stagingDir -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete — module validated and tests passed, but Publish-Module was not called."

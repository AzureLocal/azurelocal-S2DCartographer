name: Bug Report
description: Report a bug or unexpected behavior in S2DCartographer
title: "[Bug] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Provide the PowerShell commands you ran.
      placeholder: |
        Connect-S2DCluster -ClusterName "..." -Credential $cred
        Get-S2DPhysicalDiskInventory
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message
      description: Paste the complete error message and stack trace.
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `$PSVersionTable` and paste the output here. Include module version.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: mock
    attributes:
      label: Reproduction scope
      options:
        - label: Issue occurs with mock data (offline testing)
        - label: Issue occurs only against a live cluster
